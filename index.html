<!doctype html>
<html>
  <head>
    <title>Node + RDS App</title>
  </head>
  <body>
    <h2>Add User</h2>
    <input id="name" placeholder="Name" />
    <input id="email" placeholder="Email" />
    <button onclick="addUser()">Add</button>

    <h2>Users</h2>
    <button onclick="loadUsers()">Load Users</button>
    <ul id="list"></ul>

    <script>
      const API = "http://EC2-PUBLIC-IP:3000"

      function addUser() {
        fetch(API + "/add-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: name.value,
            email: email.value,
          }),
        })
          .then((res) => res.json())
          .then((data) => alert(data.message))
      }

      function loadUsers() {
        fetch(API + "/users")
          .then((res) => res.json())
          .then((data) => {
            list.innerHTML = ""
            data.forEach((u) => {
              list.innerHTML += `<li>${u.name} - ${u.email}</li>`
            })
          })
      }
    </script>
  </body>
</html>
